<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brewery Guides — NYPL Digital Collections</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #111;
      border-bottom: 1px solid #333;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f0c040;
      white-space: nowrap;
    }

    header .subtitle {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    label[for="vol-select"] {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
    }

    #vol-select {
      font-size: 13px;
      padding: 5px 8px;
      background: #2a2a2a;
      color: #f0f0f0;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      min-width: 260px;
    }

    #vol-select:focus { outline: 2px solid #f0c040; }

    .links {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .links a {
      font-size: 12px;
      color: #7ab8f5;
      text-decoration: none;
      white-space: nowrap;
      padding: 4px 8px;
      border: 1px solid #334;
      border-radius: 4px;
    }

    .links a:hover { background: #1e2a3a; }

    #viewer-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    clover-viewer {
      display: block;
      position: absolute;
      inset: 0;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Brewery Guides</h1>
    <div class="subtitle">NYPL Digital Collections · 1896–1918</div>
  </div>
  <div class="controls">
    <label for="vol-select">Volume:</label>
    <select id="vol-select"></select>
    <div class="links">
      <a id="nypl-link" href="#" target="_blank">View on NYPL</a>
      <a href="https://hadro.github.io/brewery-guides/explorer.html">Data Explorer</a>
      <a href="https://hadro.github.io/brewery-guides/">Mirador viewer</a>
    </div>
  </div>
</header>

<div id="viewer-wrap"></div>

<script>
const VOLUMES = [
  {
    label: "Brewers' guide, 1896",
    manifestId: "https://hadro.github.io/brewery-guides/1896/manifest.json",
    nyplUrl: "https://digitalcollections.nypl.org/items/bd047d10-cf0f-0131-cc6d-58d385a7bbd0",
    uuid: "bd047d10-cf0f-0131-cc6d-58d385a7bbd0",
  },
  {
    label: "Brewers' guide, 1898",
    manifestId: "https://hadro.github.io/brewery-guides/1898/manifest.json",
    nyplUrl: "https://digitalcollections.nypl.org/items/c8613600-c4d6-0131-c359-58d385a7b928",
    uuid: "c8613600-c4d6-0131-c359-58d385a7b928",
  },
  {
    label: "Tovey's directory, 1899",
    manifestId: "https://hadro.github.io/brewery-guides/1899/manifest.json",
    nyplUrl: "https://digitalcollections.nypl.org/items/13036980-d881-0131-ed0b-58d385a7b928",
    uuid: "13036980-d881-0131-ed0b-58d385a7b928",
  },
  {
    label: "Tovey's directory, 1903",
    manifestId: "https://hadro.github.io/brewery-guides/1903/manifest.json",
    nyplUrl: "https://digitalcollections.nypl.org/items/1c3611d0-c4d5-0131-5925-58d385a7bbd0",
    uuid: "1c3611d0-c4d5-0131-5925-58d385a7bbd0",
  },
  {
    label: "Tovey's directory, 1904",
    manifestId: "https://hadro.github.io/brewery-guides/1904/manifest.json",
    nyplUrl: "https://digitalcollections.nypl.org/items/e43210e0-d880-0131-d2d3-58d385a7b928",
    uuid: "e43210e0-d880-0131-d2d3-58d385a7b928",
  },
  {
    label: "Tovey's directory, 1906",
    manifestId: "https://hadro.github.io/brewery-guides/1906/manifest.json",
    nyplUrl: "https://digitalcollections.nypl.org/items/e0d472a0-c99b-0131-3d2a-58d385a7bbd0",
    uuid: "e0d472a0-c99b-0131-3d2a-58d385a7bbd0",
  },
  {
    label: "Tovey's directory, 1913",
    manifestId: "https://hadro.github.io/brewery-guides/1913/manifest.json",
    nyplUrl: "https://digitalcollections.nypl.org/items/08b2ae90-d7bd-0131-7a45-58d385a7b928",
    uuid: "08b2ae90-d7bd-0131-7a45-58d385a7b928",
  },
  {
    label: "Tovey's directory, 1914",
    manifestId: "https://hadro.github.io/brewery-guides/1914/manifest.json",
    nyplUrl: "https://digitalcollections.nypl.org/items/4f96c920-c4d5-0131-0ccc-58d385a7bbd0",
    uuid: "4f96c920-c4d5-0131-0ccc-58d385a7bbd0",
  },
  {
    label: "Tovey's directory, 1915",
    manifestId: "https://hadro.github.io/brewery-guides/1915/manifest.json",
    nyplUrl: "https://digitalcollections.nypl.org/items/27263780-d7bd-0131-de52-58d385a7b928",
    uuid: "27263780-d7bd-0131-de52-58d385a7b928",
  },
  {
    label: "Tovey's directory, 1916",
    manifestId: "https://hadro.github.io/brewery-guides/1916/manifest.json",
    nyplUrl: "https://digitalcollections.nypl.org/items/4b912140-d7bd-0131-6aa8-58d385a7b928",
    uuid: "4b912140-d7bd-0131-6aa8-58d385a7b928",
  },
  {
    label: "Tovey's directory, 1917",
    manifestId: "https://hadro.github.io/brewery-guides/1917/manifest.json",
    nyplUrl: "https://digitalcollections.nypl.org/items/5a844a20-d7bd-0131-c2cd-58d385a7b928",
    uuid: "5a844a20-d7bd-0131-c2cd-58d385a7b928",
  },
  {
    label: "Tovey's directory, 1918",
    manifestId: "https://hadro.github.io/brewery-guides/1918/manifest.json",
    nyplUrl: "https://digitalcollections.nypl.org/items/59b1baf0-c4d5-0131-f713-58d385a7bbd0",
    uuid: "59b1baf0-c4d5-0131-f713-58d385a7bbd0",
  },
];

// ── Populate dropdown ────────────────────────────────────────────────────────
const sel = document.getElementById("vol-select");
VOLUMES.forEach((v, i) => {
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = v.label;
  sel.appendChild(opt);
});

// ── IIIF Content State helpers ───────────────────────────────────────────────
function decodeContentState() {
  const raw = new URLSearchParams(window.location.search).get("iiif-content");
  if (!raw) return null;
  try {
    const b64 = raw.replace(/-/g, "+").replace(/_/g, "/");
    const padded = b64 + "=".repeat((4 - b64.length % 4) % 4);
    const json = decodeURIComponent(escape(atob(padded)));
    return JSON.parse(json);
  } catch (e) { return null; }
}

function findVolumeByManifest(manifestUrl) {
  const uuidMatch = manifestUrl.match(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i);
  if (!uuidMatch) return -1;
  const uuid = uuidMatch[0];
  return VOLUMES.findIndex(v => v.uuid === uuid || v.manifestId.includes(uuid));
}

// ── Canvas ID translation (NYPL image URL → real canvas ID) ─────────────────
function serviceId(service) {
  if (!service) return "";
  const s = Array.isArray(service) ? service[0] : service;
  return (s && (s.id || s["@id"])) || "";
}

function buildCanvasIndex(manifest) {
  const index = {};
  for (const canvas of (manifest.items || [])) {
    try {
      const body = canvas.items[0].items[0].body;
      const svc = serviceId(body.service);
      if (svc) index[svc] = canvas.id;
    } catch (e) {}
  }
  return index;
}

function oldCanvasToServiceBase(url) {
  return url.replace(/\/full\/.*$/, "");
}

// ── Clover content state (SpecificResource format + blob URL workaround) ─────
function contentStateToBlobId(stateObj) {
  const blob = new Blob([JSON.stringify(stateObj)], { type: "application/json" });
  return URL.createObjectURL(blob);
}

function buildCloverState(manifestId, canvasId, fragment) {
  const csTarget = {
    type: "SpecificResource",
    source: {
      id: canvasId,
      type: "Canvas",
      partOf: [{ id: manifestId, type: "Manifest" }],
    },
  };
  if (fragment) {
    csTarget.selector = { type: "FragmentSelector", value: fragment };
  }
  return {
    "@context": "http://iiif.io/api/presentation/3/context.json",
    id: canvasId + (fragment ? "#" + fragment : "") + "/content-state",
    type: "Annotation",
    motivation: ["contentState"],
    target: csTarget,
  };
}

// ── Close info panel (once zoom has fired or after fallback timeout) ─────────
function closeInfoPanelAfterZoom(el, fallbackMs) {
  let done = false;
  function close() {
    if (done) return;
    done = true;
    obs.disconnect();
    clearTimeout(timer);
    const btn = el.querySelector('[data-value="manifest-back"]');
    if (btn) btn.click();
  }
  // Clover sets className="clover-iiif-content-state" on the OSD container
  // exactly when it zooms to the content-state target — use that as the signal.
  const obs = new MutationObserver(mutations => {
    for (const m of mutations) {
      if (m.type === "attributes" && m.attributeName === "class" &&
          m.target.className === "clover-iiif-content-state") {
        close();
        return;
      }
    }
  });
  obs.observe(el, { subtree: true, attributes: true, attributeFilter: ["class"] });
  const timer = setTimeout(close, fallbackMs);
}

// ── Viewer lifecycle ─────────────────────────────────────────────────────────
function launchClover(manifestId, rawCanvasId) {
  const wrap = document.getElementById("viewer-wrap");
  const old = wrap.querySelector("clover-viewer");
  if (old) old.remove();

  const el = document.createElement("clover-viewer");

  if (!rawCanvasId) {
    // No target canvas — open manifest at first page
    el.setAttribute("id", manifestId);
    wrap.appendChild(el);
    closeInfoPanelAfterZoom(el, 1500);
    return;
  }

  // Translate NYPL image URL → real manifest canvas ID, then build blob state
  const fragment = rawCanvasId.includes("#") ? rawCanvasId.split("#")[1] : "";
  const oldBase  = rawCanvasId.includes("#") ? rawCanvasId.split("#")[0] : rawCanvasId;

  fetch(manifestId)
    .then(r => r.json())
    .then(manifest => {
      const index = buildCanvasIndex(manifest);
      const svcBase = oldCanvasToServiceBase(oldBase);
      const newCanvasId = index[svcBase] || index[oldBase] || oldBase;
      el.setAttribute("id", contentStateToBlobId(buildCloverState(manifestId, newCanvasId, fragment)));
      wrap.appendChild(el);
      closeInfoPanelAfterZoom(el, 5000);
    })
    .catch(() => {
      el.setAttribute("id", manifestId);
      wrap.appendChild(el);
      closeInfoPanelAfterZoom(el, 1500);
    });
}

function updateLinks(vol) {
  document.getElementById("nypl-link").href = vol.nyplUrl;
}

// ── Initialise ───────────────────────────────────────────────────────────────
const contentState = decodeContentState();
let startVolIdx = 0;
let startCanvasId = null;

if (contentState) {
  const target = contentState.target || {};
  const source = (target.type === "SpecificResource" && target.source) ? target.source : target;
  const manifestUrl = (source.partOf && source.partOf[0] && source.partOf[0].id) || "";
  const volIdx = findVolumeByManifest(manifestUrl);
  if (volIdx >= 0) {
    startVolIdx = volIdx;
    startCanvasId = (typeof source === "string" ? source : (source.id || "")).split("#")[0];
    if (source.id && source.id.includes("#")) startCanvasId += "#" + source.id.split("#")[1];
    sel.value = volIdx;
  }
}

const startVol = VOLUMES[startVolIdx];
launchClover(startVol.manifestId, startCanvasId);
updateLinks(startVol);

sel.addEventListener("change", () => {
  const vol = VOLUMES[parseInt(sel.value)];
  updateLinks(vol);
  launchClover(vol.manifestId, null);
});
</script>

<script src="clover.umd.patched.js"></script>
</body>
</html>
